- name: News
  columns:
    - size: small
      widgets:
        - type: custom-api
          title: Gold Price
          cache: 1h
          url: https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/xau.json
          template: |
            {{ $price := .JSON.Int "xau.usd" }}
            {{ $gram21kUSD := div (mul $price 21) 746 }}
            {{ $gram21kJOD := div (mul $gram21kUSD 709) 1000 }}
            <div class="flex flex-column gap-15">
              <div>
                <p class="size-h6 color-subdue">SPOT PRICE</p>
                <p class="size-h2 color-primary">${{ formatNumber $price }}</p>
                <p class="size-h6 color-subdue">per troy oz · XAU/USD</p>
              </div>
              <div style="border-top: 1px solid rgba(255,255,255,0.08); padding-top: 10px;">
                <p class="size-h6 color-subdue">21 KARAT / GRAM</p>
                <div class="flex gap-10 items-center margin-block-4">
                  <span class="size-h3 color-highlight">${{ $gram21kUSD }}</span>
                  <span class="size-h5 color-subdue">USD</span>
                </div>
                <div class="flex gap-10 items-center">
                  <span class="size-h3 color-highlight">{{ $gram21kJOD }}</span>
                  <span class="size-h5 color-subdue">JOD</span>
                </div>
              </div>
              <p class="size-h6 color-subdue">{{ .JSON.String "date" }}</p>
            </div>

    - size: full
      widgets:
        - type: rss
          title: Middle East & Geopolitics
          style: horizontal-cards
          limit: 8
          collapse-after: 4
          feeds:
            - url: https://www.aljazeera.com/xml/rss/all.xml
              title: Al Jazeera
            - url: https://feeds.bbci.co.uk/news/world/middle_east/rss.xml
              title: BBC Middle East
            - url: https://www.theguardian.com/world/middleeast/rss
              title: The Guardian

        - type: rss
          title: Technology
          style: horizontal-cards
          limit: 12
          collapse-after: 6
          feeds:
            - url: https://techcrunch.com/feed/
              title: TechCrunch
            - url: https://www.theverge.com/rss/index.xml
              title: The Verge
            - url: https://feeds.arstechnica.com/arstechnica/index
              title: Ars Technica

    - size: small
      widgets:
        - type: rss
          title: Flight Simulation
          limit: 6
          collapse-after: 4
          feeds:
            - url: https://fselite.net/feed/
              title: FSElite
            - url: https://www.thresholdx.net/news/rss.xml
              title: Threshold
            - url: https://flightsim.to/rss/news
              title: FlightSim.to

        - type: reddit
          title: r/aviation
          subreddit: aviation
          limit: 5
          collapse-after: 3
          show-thumbnails: false
