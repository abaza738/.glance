- name: Home
  columns:
    - size: small
      widgets:
        - type: weather
          title: Amman
          location: Amman, Jordan
          units: metric
          hour-format: 24h
          hide-location: true

        - type: custom-api
          title: OJAI METAR
          cache: 30m
          url: https://aviationweather.gov/api/data/metar?ids=OJAI,OJAM&format=json
          template: |
            {{ $rt := .JSON.String "0.reportTime" }}<p class="color-subdue size-h6">{{ slice $rt 11 13 }}{{ slice $rt 14 16 }}Z</p>
            <p class="margin-top-10" style="font-family: monospace; font-size: 11px; line-height: 1.6;">{{ .JSON.String "0.rawOb" }}</p>
            <p class="margin-top-10" style="font-family: monospace; font-size: 11px; line-height: 1.6;">{{ .JSON.String "1.rawOb" }}</p>

        - type: clock
          hour-format: 24h
          timezones:
            - timezone: Europe/Amsterdam
              label: Klompen
            - timezone: UTC
              label: Zulu
            - timezone: America/New_York
              label: Syam
            - timezone: America/Los_Angeles
              label: Hayward
            - timezone: Australia/Brisbane
              label: Pookie Land

    - size: full
      widgets:
        - type: search
          search-engine: duckduckgo
          autofocus: true
          bangs:
            - title: YouTube
              shortcut: "!y"
              url: https://www.youtube.com/results?search_query={QUERY}
            - title: Translate
              shortcut: "!t"
              url: https://translate.google.com/?sl=auto&tl=en&text={QUERY}&op=translate

        - type: bookmarks
          groups:
            - hide-arrow: true
              same-tab: true
              links:
                - title: Abaza
                  url: https://abaza.dev
                  icon: /assets/images/abaza738.png

                - title: YouTube
                  url: https://youtube.com
                  icon: si:youtube

                - title: GitHub
                  url: https://github.com/feed/
                  icon: si:github

                - title: Reddit
                  url: https://reddit.com
                  icon: si:reddit

                - title: ProtonMail
                  url: https://mail.protonmail.com
                  icon: si:protonmail

                - title: POSCON HQ
                  url: https://hq.poscon.net
                  icon: /assets/images/poscon.ico

                - title: Cloudflare
                  url: https://dash.cloudflare.com
                  icon: si:cloudflare

                - title: Claude AI
                  url: https://claude.ai
                  icon: si:anthropic

                - title: ChatGPT
                  url: https://chatgpt.com
                  icon: si:openai

                - title: Simbrief
                  url: https://www.simbrief.com/home
                  icon: /assets/images/simbrief.png

                - title: VAMSYS
                  url: https://vamsys.io
                  icon: /assets/images/vamsys.png

                - title: Flightsim.to
                  url: https://flightsim.to
                  icon: /assets/images/flightsim.to.svg

        - type: split-column
          max-columns: 2
          widgets:
            - type: iframe
              title: Focus
              source: http://localhost:6969/assets/focus.html
              height: 240
            - type: iframe
              title: Streaks
              source: http://localhost:6969/assets/streaks.html
              height: 240

        - type: iframe
          title: Progress
          source: http://localhost:6969/assets/heatmap.html
          height: 190

        - type: videos
          title: YouTube
          limit: 10
          channels:
            - UCKALXb2rTLNwVgH9DHVVPLw # Aviation101
            - UC9H0HzpKf5JlazkADWnW1Jw # bashbunni
            - UCsBjURrPoezykLs9EqgamOA # Fireship
            - UCJXa3_WNNmIpewOtCHf3B0g # LaurieWired
            - UC8ENHE5xdFSwx71u3fDH5Xw # The Primeagen
            - UCHnyfMqiRRG1u-2MsSQLbXA # Veritasium

    - size: small
      widgets:
        - type: custom-api
          title: Prayer Times · Amman
          cache: 6h
          url: https://api.aladhan.com/v1/timingsByCity?city=Amman&country=Jordan&method=3
          template: |
            {{ $now := now | formatTime "15:04" }}
            {{ $fajr := .JSON.String "data.timings.Fajr" }}
            {{ $dhuhr := .JSON.String "data.timings.Dhuhr" }}
            {{ $asr := .JSON.String "data.timings.Asr" }}
            {{ $maghrib := .JSON.String "data.timings.Maghrib" }}
            {{ $isha := .JSON.String "data.timings.Isha" }}
            {{ $next := "Fajr" }}
            {{ if gt $now $isha }}{{ $next = "Fajr" }}
            {{ else if gt $now $maghrib }}{{ $next = "Isha" }}
            {{ else if gt $now $asr }}{{ $next = "Maghrib" }}
            {{ else if gt $now $dhuhr }}{{ $next = "Asr" }}
            {{ else if gt $now $fajr }}{{ $next = "Dhuhr" }}
            {{ end }}
            <div class="flex flex-column gap-8">
              <div class="flex justify-between">
                <span class="size-h6{{ if ne $next "Fajr" }} color-subdue{{ end }}">Fajr</span>
                <span{{ if eq $next "Fajr" }} class="color-primary"{{ end }}>{{ $fajr }}</span>
              </div>
              <div class="flex justify-between">
                <span class="size-h6{{ if ne $next "Dhuhr" }} color-subdue{{ end }}">Dhuhr</span>
                <span{{ if eq $next "Dhuhr" }} class="color-primary"{{ end }}>{{ $dhuhr }}</span>
              </div>
              <div class="flex justify-between">
                <span class="size-h6{{ if ne $next "Asr" }} color-subdue{{ end }}">Asr</span>
                <span{{ if eq $next "Asr" }} class="color-primary"{{ end }}>{{ $asr }}</span>
              </div>
              <div class="flex justify-between">
                <span class="size-h6{{ if ne $next "Maghrib" }} color-subdue{{ end }}">Maghrib</span>
                <span{{ if eq $next "Maghrib" }} class="color-primary"{{ end }}>{{ $maghrib }}</span>
              </div>
              <div class="flex justify-between">
                <span class="size-h6{{ if ne $next "Isha" }} color-subdue{{ end }}">Isha</span>
                <span{{ if eq $next "Isha" }} class="color-primary"{{ end }}>{{ $isha }}</span>
              </div>
            </div>

        - type: releases
          title: GitHub
          cache: 1d
          token: ${GITHUB_TOKEN}
          repositories:
            - glanceapp/glance
            - jesseduffield/lazygit
            - jesseduffield/lazydocker
            - nuxt/nuxt
            - nuxt/ui
            - tauri-apps/tauri
            - vuejs/core

        - type: twitch-channels
          title: Twitch!
          channels:
            - bashbunni
            - danielroe
            - ${SNOW}
            - theprimeagen
