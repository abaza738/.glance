<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Progress</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: rgb(14, 15, 21);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
    }

    main {
      background: #12131c;
      border-radius: 8px;
      border: 1px solid rgb(22, 23, 34);
      padding: 16px;
    }

    .wrap {
      display: flex;
      gap: 5px;
      align-items: flex-start;
    }

    .day-labels {
      display: flex;
      flex-direction: column;
      gap: 3px;
      color: hsl(235, 12%, 30%);
      font-size: 9px;
    }

    .day-labels span {
      height: 15px;
      line-height: 15px;
    }

    .grid {
      display: grid;
      grid-template-rows: repeat(7, 15px);
      grid-auto-flow: column;
      grid-auto-columns: 15px;
      gap: 3px;
    }

    .cell {
      width: 15px;
      height: 15px;
      border-radius: 3px;
      background: hsl(235, 20%, 13%);
    }

    .legend {
      display: flex;
      gap: 14px;
      margin-top: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      color: hsl(235, 12%, 35%);
      font-size: 9px;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <main>
    <div class="wrap">
      <div class="day-labels">
        <span>S</span><span>M</span><span>T</span>
        <span>W</span><span>T</span><span>F</span><span>S</span>
      </div>
      <div class="grid" id="grid"></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#4a7fd4"></div>GoLang</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4a9e72"></div>Circassian</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c47a3a"></div>Sports</div>
    </div>
  </main>

  <script>
    const LS_KEY = 'growth_sessions';

    const COLORS = {
      golang:     '#4a7fd4',
      circassian: '#4a9e72',
      sports:     '#c47a3a',
    };

    function localISO(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function cellBg(pillars) {
      const unique = [...new Set(pillars)].filter(p => COLORS[p]);
      if (unique.length === 0) return null;
      if (unique.length === 1) return COLORS[unique[0]];
      if (unique.length === 2) {
        const [a, b] = unique.map(p => COLORS[p]);
        return `linear-gradient(to bottom, ${a} 50%, ${b} 50%)`;
      }
      const [a, b, c] = unique.map(p => COLORS[p]);
      return `linear-gradient(to bottom, ${a} 33%, ${b} 33%, ${b} 67%, ${c} 67%)`;
    }

    async function build() {
      // --- load sessions.json ---
      let remote = [];
      try {
        const r = await fetch('/assets/sessions.json?t=' + Date.now());
        remote = await r.json();
      } catch {}

      // --- load localStorage ---
      let local = [];
      try { local = JSON.parse(localStorage.getItem(LS_KEY) || '[]'); }
      catch {}

      // --- merge into map: date → Set of pillars ---
      const map = {};
      for (const s of [...remote, ...local]) {
        if (!s.date || !s.pillar) continue;
        if (!map[s.date]) map[s.date] = new Set();
        map[s.date].add(s.pillar);
      }

      // --- build grid ---
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const start = new Date(today);
      start.setDate(today.getDate() - today.getDay() - 15 * 7);

      const grid   = document.getElementById('grid');
      const cursor = new Date(start);

      while (cursor <= today) {
        const iso     = localISO(cursor);
        const pillars = map[iso] ? [...map[iso]] : [];
        const cell    = document.createElement('div');
        cell.className = 'cell';
        cell.title = iso + (pillars.length ? ' · ' + pillars.join(', ') : '');
        const bg = cellBg(pillars);
        if (bg) cell.style.background = bg;
        grid.appendChild(cell);
        cursor.setDate(cursor.getDate() + 1);
      }
    }

    build();
  </script>
</body>
</html>
