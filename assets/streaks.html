<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Streaks</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: rgb(14, 15, 21);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
      padding-right: 1px;
    }

    main {
      background: #12131c;
      border-radius: 8px;
      border: 1px solid rgb(22, 23, 34);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .accent {
      width: 3px;
      height: 30px;
      border-radius: 2px;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .pillar-name {
      font-size: 10px;
      color: hsl(235, 12%, 50%);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .best {
      font-size: 9px;
      color: hsl(235, 12%, 28%);
    }

    .streak {
      text-align: right;
      flex-shrink: 0;
      min-width: 32px;
    }

    .streak-num {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .streak-num.zero {
      color: hsl(235, 12%, 25%);
    }

    .streak-unit {
      font-size: 9px;
      color: hsl(235, 12%, 32%);
      text-align: right;
      margin-top: 1px;
    }
  </style>
</head>
<body>
  <main id="main"></main>

  <script>
    const PILLARS = [
      { key: 'golang',     label: 'GoLang',     color: '#4a7fd4' },
      { key: 'circassian', label: 'Circassian', color: '#4a9e72' },
      { key: 'sports',     label: 'Sports',     color: '#c47a3a' },
    ];

    function localISO(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function calcStreaks(sessions) {
      const byPillar = {};
      for (const s of sessions) {
        if (!s.date || !s.pillar) continue;
        if (!byPillar[s.pillar]) byPillar[s.pillar] = new Set();
        byPillar[s.pillar].add(s.date);
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      return PILLARS.map(p => {
        const dates = byPillar[p.key] || new Set();

        // current streak: walk back from today (skip today if no session yet)
        let current = 0;
        const cur = new Date(today);
        if (!dates.has(localISO(cur))) cur.setDate(cur.getDate() - 1);
        while (dates.has(localISO(cur))) {
          current++;
          cur.setDate(cur.getDate() - 1);
        }

        // best streak: scan sorted dates
        const sorted = [...dates].sort();
        let best = 0, run = 0, prev = null;
        for (const d of sorted) {
          if (prev) {
            const diff = (new Date(d) - new Date(prev)) / 86400000;
            run = diff === 1 ? run + 1 : 1;
          } else {
            run = 1;
          }
          if (run > best) best = run;
          prev = d;
        }

        return { ...p, current, best };
      });
    }

    async function build() {
      let remote = [];
      try {
        const r = await fetch('/assets/sessions.json?t=' + Date.now());
        remote = await r.json();
      } catch {}

      let local = [];
      try { local = JSON.parse(localStorage.getItem('growth_sessions') || '[]'); } catch {}

      const streaks = calcStreaks([...remote, ...local]);
      const main = document.getElementById('main');

      for (const s of streaks) {
        const active = s.current > 0;
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
          <div class="accent" style="background: ${active ? s.color : 'hsl(235, 12%, 18%)'}"></div>
          <div class="info">
            <div class="pillar-name">${s.label}</div>
            <div class="best">best ${s.best}</div>
          </div>
          <div class="streak">
            <div class="streak-num ${active ? '' : 'zero'}" style="${active ? `color:${s.color}` : ''}">${active ? s.current : '—'}</div>
            <div class="streak-unit">${s.current === 1 ? 'day' : s.current > 1 ? 'days' : ''}</div>
          </div>
        `;
        main.appendChild(row);
      }
    }

    build();
  </script>
</body>
</html>
